<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thí nghiệm: Mạch điện</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 16px;
        }

        .experiment-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            min-height: 700px;
        }

        .simulation-frame {
            width: 100%;
            height: 700px;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .simulation-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Chatbot Styles */
        #chatbot-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        #chatbot-toggle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #chatbot-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        #chatbot-container {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 450px;
            height: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chatbot-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chatbot-header h3 {
            font-size: 18px;
            margin: 0;
        }

        .chatbot-header button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .chatbot-header button:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        #chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message {
            background: white;
            padding: 15px;
            border-radius: 10px 10px 10px 0;
            border-left: 4px solid #667eea;
            color: #333;
            line-height: 1.6;
        }

        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-radius: 10px 10px 0 10px;
            margin-left: auto;
            max-width: 80%;
            color: white;
            line-height: 1.6;
        }

        .suggestion-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .suggestion-buttons button {
            background: #f0f0f0;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            text-align: left;
        }

        .suggestion-buttons button:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .chatbot-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #user-input:focus {
            border-color: #667eea;
        }

        #user-input::placeholder {
            color: #999;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .typing-indicator {
            display: none;
            padding: 15px;
            background: white;
            border-radius: 10px 10px 10px 0;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #chatbot-container {
                width: 90%;
                right: 5%;
                height: 80vh;
            }

            #chatbot-widget {
                bottom: 20px;
                right: 20px;
            }
        }

        .welcome-message {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }

        .welcome-message strong {
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 Thí nghiệm: Mạch điện</h1>
            <p>Khám phá mạch nối tiếp và mạch song song</p>
        </header>

        <div class="experiment-container">
            <div class="simulation-frame">
                <iframe 
                    src="https://phet.colorado.edu/sims/html/circuit-construction-kit-ac-virtual-lab/latest/circuit-construction-kit-ac-virtual-lab_all.html" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div id="chatbot-widget">
        <button id="chatbot-toggle" onclick="toggleChatbot()">
            💬 Hỏi trợ giảng AI
        </button>
        
        <div id="chatbot-container">
            <div class="chatbot-header">
                <h3>🤖 Trợ giảng ảo – Mạch điện</h3>
                <button onclick="toggleChatbot()">✕</button>
            </div>
            
            <div id="chatbot-messages">
                <div class="ai-message">
                    <div class="welcome-message">
                        <strong>Chào em! 👋</strong><br>
                        Trợ giảng AI sẵn sàng hỗ trợ em khám phá thí nghiệm mạch điện!
                    </div>
                    <strong>Em có thể hỏi:</strong>
                    <div class="suggestion-buttons">
                        <button onclick="askQuestion(1)">1. Mục đích thí nghiệm?</button>
                        <button onclick="askQuestion(3)">3. Chiều dòng điện?</button>
                        <button onclick="askQuestion(4)">4. Cách mắc ampe kế?</button>
                        <button onclick="askQuestion(5)">5. Mạch nối tiếp/song song?</button>
                    </div>
                    <p style="margin-top: 10px; font-size: 13px; color: #666;">Hoặc nhập câu hỏi của em ở dưới!</p>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>
            
            <div class="chatbot-input">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Nhập câu hỏi của em..." 
                    onkeypress="handleKeyPress(event)"
                />
                <button class="send-button" onclick="sendMessage()">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        // Database of questions and answers
        const predefinedQuestions = {
            1: "Em hãy nêu mục đích của thí nghiệm này?",
            2: "Chúng ta muốn tìm hiểu điều gì khi thao tác với mạch điện trong mô phỏng này?",
            3: "Chiều dòng điện quy ước được quy định như thế nào?",
            4: "Ampe kế và vôn kế được mắc như thế nào trong mạch điện?",
            5: "Thế nào là mạch nối tiếp? Thế nào là mạch song song?",
            6: "Nếu mắc thêm một bóng đèn giống nhau nối tiếp, em dự đoán độ sáng sẽ thay đổi thế nào? Vì sao?",
            7: "Nếu chuyển sang mạch song song, em dự đoán cường độ dòng điện qua mạch chính sẽ tăng hay giảm?",
            8: "Khi mắc hai bóng đèn nối tiếp, em quan sát thấy độ sáng của chúng như thế nào?",
            9: "Số chỉ của ampe kế và vôn kế thay đổi ra sao khi em thay đổi cách mắc mạch?",
            10: "Tại sao bóng đèn lại sáng mờ hơn khi mắc nối tiếp thêm một bóng đèn giống hệt?",
            11: "Hiệu điện thế giữa hai đầu mỗi bóng đèn trong mạch nối tiếp có bằng nhau không? Điều này nói lên điều gì?",
            12: "Từ thí nghiệm này, em rút ra kết luận gì về mối quan hệ giữa U, I và cách mắc mạch?",
            13: "Ưu điểm và nhược điểm của mạch song song và mạch nối tiếp là gì?"
        };

        const answers = {
            1: "🎯 <strong>Mục đích của thí nghiệm:</strong><br><br>Mục đích của thí nghiệm là giúp em hiểu về:<br>• Cách mắc mạch điện <strong>nối tiếp</strong> và <strong>song song</strong><br>• Quan sát sự thay đổi của <strong>cường độ dòng điện (I)</strong> và <strong>hiệu điện thế (U)</strong> trong các loại mạch khác nhau<br>• Rút ra được các <strong>kiến thức cơ bản</strong> về mạch điện<br>• Hiểu cách sử dụng <strong>ampe kế</strong> và <strong>vôn kế</strong> trong thực tế",
            
            2: "🔍 <strong>Nội dung tìm hiểu:</strong><br><br>Chúng ta muốn tìm hiểu về:<br>• Mối quan hệ giữa <strong>cường độ dòng điện (I)</strong>, <strong>hiệu điện thế (U)</strong> và <strong>điện trở (R)</strong><br>• Cách mắc <strong>ampe kế</strong> (nối tiếp) và <strong>vôn kế</strong> (song song)<br>• Sự khác biệt giữa <strong>mạch nối tiếp</strong> và <strong>mạch song song</strong><br>• Ảnh hưởng của cách mắc mạch đến <strong>độ sáng bóng đèn</strong>",
            
            3: "⚡ <strong>Chiều dòng điện quy ước:</strong><br><br>Chiều dòng điện quy ước là chiều từ <strong>cực dương (+)</strong> của nguồn điện, qua dây dẫn và các thiết bị điện, đến <strong>cực âm (-)</strong> của nguồn điện.<br><br>💡 <strong>Lưu ý:</strong> Đây là quy ước được sử dụng phổ biến trong vật lý, mặc dù thực tế <strong>electron</strong> di chuyển theo chiều ngược lại (từ âm sang dương).",
            
            4: "📊 <strong>Cách mắc dụng cụ đo:</strong><br><br>• <strong>Ampe kế (A):</strong> Mắc <strong>nối tiếp</strong> với đoạn mạch cần đo cường độ dòng điện<br>  → Vì ampe kế có điện trở rất nhỏ<br><br>• <strong>Vôn kế (V):</strong> Mắc <strong>song song</strong> với đoạn mạch cần đo hiệu điện thế<br>  → Vì vôn kế có điện trở rất lớn<br><br>⚠️ <strong>Chú ý:</strong> Mắc sai sẽ làm hỏng dụng cụ hoặc cho kết quả sai!",
            
            5: "🔌 <strong>Phân biệt mạch điện:</strong><br><br><strong>Mạch nối tiếp:</strong><br>• Các thiết bị mắc <strong>liên tiếp</strong> nhau<br>• Chỉ có <strong>một đường đi</strong> duy nhất cho dòng điện<br>• Nếu một bóng đèn đứt → <strong>toàn bộ mạch ngắt</strong><br><br><strong>Mạch song song:</strong><br>• Các thiết bị mắc thành <strong>nhiều nhánh riêng</strong><br>• Dòng điện có <strong>nhiều đường đi</strong> khác nhau<br>• Nếu một bóng đèn đứt → <strong>các bóng khác vẫn sáng</strong>",
            
            6: "💡 <strong>Dự đoán:</strong> Độ sáng sẽ <strong>giảm</strong> (sáng yếu hơn)<br><br><strong>Giải thích:</strong><br>• Khi mắc nối tiếp thêm bóng đèn → điện trở tổng <strong>tăng</strong><br>• Theo định luật Ohm: <strong>I = U/R</strong><br>• Khi R tăng mà U không đổi → <strong>I giảm</strong><br>• Dòng điện yếu hơn → công suất <strong>P = I²R</strong> giảm<br>→ Bóng đèn <strong>sáng yếu đi</strong>",
            
            7: "📈 <strong>Dự đoán:</strong> Cường độ dòng điện qua mạch chính sẽ <strong>tăng</strong><br><br><strong>Giải thích:</strong><br>• Trong mạch song song, điện trở tương đương <strong>giảm</strong><br>• Công thức: <strong>1/Rt = 1/R₁ + 1/R₂ + ...</strong><br>• Rt nhỏ hơn điện trở của từng nhánh<br>• Theo <strong>I = U/R</strong>: khi R giảm → <strong>I tăng</strong><br>→ Dòng điện tổng trong mạch chính <strong>tăng lên</strong>",
            
            8: "👀 <strong>Quan sát:</strong><br><br>Khi mắc hai bóng đèn giống nhau nối tiếp:<br>• Cả hai bóng đèn sáng <strong>yếu hơn</strong> so với khi mắc một bóng đèn duy nhất<br>• Nếu hai bóng đèn <strong>giống hệt nhau</strong> → chúng sáng với <strong>cường độ bằng nhau</strong><br><br>💡 <strong>Giải thích:</strong> Hiệu điện thế của nguồn được chia đều cho hai bóng đèn",
            
            9: "📐 <strong>Sự thay đổi số chỉ:</strong><br><br><strong>Mạch nối tiếp:</strong><br>• Ampe kế: chỉ <strong>cùng một giá trị</strong> tại mọi điểm<br>• Vôn kế: chỉ hiệu điện thế <strong>giảm dần</strong> qua mỗi bóng đèn<br><br><strong>Mạch song song:</strong><br>• Ampe kế ở mạch chính: chỉ giá trị <strong>lớn hơn</strong> (tổng các dòng nhánh)<br>• Vôn kế: chỉ <strong>cùng một giá trị</strong> ở các nhánh song song",
            
            10: "💡 <strong>Giải thích chi tiết:</strong><br><br>Khi mắc nối tiếp thêm bóng đèn:<br>1. Điện trở tổng mạch <strong>tăng lên</strong> (Rt = R₁ + R₂)<br>2. Theo định luật Ohm: <strong>I = U/Rt</strong><br>3. Khi Rt tăng mà U không đổi → <strong>I giảm</strong><br>4. Công suất tiêu thụ: <strong>P = I²R</strong><br>5. I giảm → P giảm mạnh (vì I bình phương)<br><br>→ Bóng đèn <strong>sáng yếu hơn</strong>",
            
            11: "📊 <strong>Hiệu điện thế trong mạch nối tiếp:</strong><br><br><strong>Nếu hai bóng đèn giống hệt nhau:</strong><br>• Hiệu điện thế giữa hai đầu mỗi bóng đèn <strong>bằng nhau</strong><br>• Mỗi bóng nhận <strong>một nửa</strong> hiệu điện thế của nguồn<br>• Ví dụ: Nguồn 12V → mỗi bóng nhận 6V<br><br><strong>Ý nghĩa:</strong><br>Điều này cho thấy trong mạch nối tiếp, hiệu điện thế được <strong>chia tỉ lệ thuận</strong> với điện trở của từng phần tử",
            
            12: "📝 <strong>Kết luận:</strong><br><br><strong>Mạch nối tiếp:</strong><br>• I như nhau tại mọi điểm: <strong>I = I₁ = I₂</strong><br>• U tổng bằng tổng các U: <strong>U = U₁ + U₂</strong><br>• R tổng bằng tổng các R: <strong>Rt = R₁ + R₂</strong><br><br><strong>Mạch song song:</strong><br>• U như nhau ở các nhánh: <strong>U = U₁ = U₂</strong><br>• I tổng bằng tổng các I: <strong>I = I₁ + I₂</strong><br>• <strong>1/Rt = 1/R₁ + 1/R₂</strong><br><br>✅ <strong>Định luật Ohm U = I.R luôn đúng</strong> trong cả hai loại mạch",
            
            13: "⚖️ <strong>So sánh ưu nhược điểm:</strong><br><br><strong>Mạch nối tiếp:</strong><br>✅ <strong>Ưu điểm:</strong><br>• Đơn giản, dễ lắp đặt<br>• Tiết kiệm dây dẫn<br><br>❌ <strong>Nhược điểm:</strong><br>• Một thiết bị hỏng → toàn bộ mạch ngừng<br>• Các thiết bị không hoạt động độc lập<br>• Hiệu điện thế bị chia<br><br><strong>Mạch song song:</strong><br>✅ <strong>Ưu điểm:</strong><br>• Các thiết bị hoạt động độc lập<br>• Một thiết bị hỏng → các thiết bị khác vẫn hoạt động<br>• Hiệu điện thế ổn định ở các nhánh<br><br>❌ <strong>Nhược điểm:</strong><br>• Tốn nhiều dây dẫn<br>• Lắp đặt phức tạp hơn"
        };

        // Initial suggestions (shown when chatbot opens)
        const initialSuggestions = [1, 3, 4, 5];
        
        // Fallback suggestions (shown when student asks outside questions)
        const fallbackSuggestions = [1, 10, 11, 12, 13];

        // Toggle chatbot visibility
        function toggleChatbot() {
            const container = document.getElementById('chatbot-container');
            const toggleBtn = document.getElementById('chatbot-toggle');
            
            if (container.style.display === 'flex') {
                container.style.display = 'none';
                toggleBtn.style.display = 'flex';
            } else {
                container.style.display = 'flex';
                toggleBtn.style.display = 'none';
            }
        }

        // Ask predefined question
        function askQuestion(questionNumber) {
            const question = predefinedQuestions[questionNumber];
            const answer = answers[questionNumber];
            
            // Add user message
            addMessage(question, 'user');
            
            // Show typing indicator
            showTyping();
            
            // Add AI response after delay
            setTimeout(() => {
                hideTyping();
                addMessage(answer, 'ai');
            }, 800);
        }

        // Send custom message
        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (message === '') return;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            showTyping();
            
            // Process message
            setTimeout(() => {
                hideTyping();
                const response = processMessage(message);
                addMessage(response, 'ai');
            }, 800);
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Process user message
        function processMessage(userMessage) {
            // Check if message matches any predefined question
            let matchedNumber = null;
            
            for (let [num, question] of Object.entries(predefinedQuestions)) {
                const numInt = parseInt(num);
                
                // Check by number (e.g., "1", "1.", "Câu 1")
                if (userMessage.includes(num + '.') || 
                    userMessage.includes('Câu ' + num) ||
                    userMessage.trim() === num) {
                    matchedNumber = numInt;
                    break;
                }
                
                // Check by keywords from question (first 30 characters)
                const questionKeywords = question.toLowerCase().substring(0, 30);
                if (userMessage.toLowerCase().includes(questionKeywords)) {
                    matchedNumber = numInt;
                    break;
                }
            }
            
            if (matchedNumber) {
                return answers[matchedNumber];
            } else {
                // Return fallback message with suggestions
                let suggestionHTML = '';
                fallbackSuggestions.forEach(num => {
                    const question = predefinedQuestions[num];
                    // Shorten question for display
                    const shortQuestion = question.length > 50 ? question.substring(0, 50) + '...' : question;
                    suggestionHTML += `<button onclick="askQuestion(${num})">${num}. ${shortQuestion}</button>`;
                });
                
                return `Cảm ơn em, câu hỏi rất hay! 👍<br><br>Tuy nhiên, để tập trung vào nội dung thí nghiệm, em hãy chọn một trong các câu hỏi gợi ý sau nhé:<br><br><div class="suggestion-buttons">${suggestionHTML}</div>`;
            }
        }

        // Add message to chat
        function addMessage(content, sender) {
            const messagesDiv = document.getElementById('chatbot-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.innerHTML = content;
            messagesDiv.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            document.getElementById('typing-indicator').style.display = 'block';
            const messagesDiv = document.getElementById('chatbot-messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Hide typing indicator
        function hideTyping() {
            document.getElementById('typing-indicator').style.display = 'none';
        }

        // Initialize
        window.onload = function() {
            console.log('Virtual Experiment loaded successfully!');
            console.log('Chatbot is ready to assist students.');
        };
    </script>
</body>
</html>
